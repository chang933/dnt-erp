# Render Blueprint: 저장소 연결 후 New Blueprint로 이 파일 지정
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dnt-erp-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: ENVIRONMENT
        value: production
      # Supabase: Session 풀러(pooler...:5432)는 MaxClientsInSessionMode에 걸리기 쉬움 → Transaction 6543 권장.
      # db.PROJECT.supabase.co:6543 는 Render에서 IPv6 unreachable 이 날 수 있음 → aws-0-REGION.pooler.supabase.com:6543
      #   + 사용자명 postgres.PROJECTREF (Connect의 Pooler URI 참고) + postgresql+psycopg2://
      # DATABASE_URL 값에 따옴표 넣지 말 것. 비밀번호에 @ 등 특수문자면 URL 인코딩 필요.
      # DB 기동 실패 시에도 배포를 통과시키려면(기본: Render에서 자동) 코드가 프로세스를 유지함. 강제 실패는 DB_STARTUP_STRICT=1
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BOOTSTRAP_ADMIN_USERNAME
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
